
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta content="no-referrer" name="referrer" />
  <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible" />
  <meta content="width=device-width, initial-scale=1, user-scalable=no" name="viewport" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <title>Multiplayer Video System</title>
  <!-- Ads monetag -->
  <meta name="monetag" content="" />


  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50' y='55' font-size='80' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='sans-serif' font-weight='bold'%3EG%3C/text%3E%3C/svg%3E" />
  <!-- Clappr Player and its dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <!-- HLS.js plugin -->
  <script src="https://cdn.jsdelivr.net/npm/clappr-hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
  <!-- DASH Shaka plugin for Clappr -->
  <script src="https://cdn.jsdelivr.net/npm/clappr-dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>

  <!-- JWPlayer (self-hosted with DASH+DRM support) -->
  <script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
  <!--<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>-->
  <!-- Shaka Player -->
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css"
    crossorigin="anonymous" />
  <!-- Material Icons for Shaka UI customization -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />

  <!-- JWPlayer Key -->
  <script>
    if (typeof jwplayer !== "undefined") {
      jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";
    }
  </script>

  <!-- Disable DevTool -->
  <script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>
  <script type="module" crossorigin src="/player.js"></script>
  <link rel="stylesheet" crossorigin href="/player.css">
</head>

<script>
setTimeout(function() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  root.style.cssText = 'width:100%;max-width:1000px;margin:0 auto;aspect-ratio:16/9;background:#000;position:relative;';

  // 1. Baca parameter?hls= dari URL
  const urlParams = new URLSearchParams(window.location.search);
  const channel = urlParams.get('hls') || 'default';

  // 2. DAFTAR STREAM DOANG - POSTER KITA BIKIN 1 UNTUK SEMUA
  const streams = {
    'skycalcio': 'https://link-m3u8-skycalcio-lu.m3u8', // GANTI LINK ASLI
    'bein1': 'https://link-m3u8-bein1-lu.m3u8', // GANTI LINK ASLI
    'rcitv': 'https://link-m3u8-rci-lu.m3u8', // GANTI LINK ASLI
    'default': 'https://test-streams.mux.dev/x36xhzz.m3u8'
  };

  // 3. POSTER 1 UNTUK SEMUA CHANNEL - GANTI INI DOANG
  const POSTER_SATU_UNTUK_SEMUA = 'https://pluyer.pages.dev/playse.jpg';

  // 4. Pilih stream sesuai?hls=
  const currentStream = streams[channel] || streams['default'];

  // Watermark Sibal TV
  const watermark = document.createElement('div');
  watermark.textContent = 'Sibal TV';
  watermark.style.cssText = 'position:absolute;top:10px;right:15px;color:#fff;z-index:999;font-family:Inter,sans-serif;font-size:14px;opacity:0.8;';
  root.appendChild(watermark);

  // 5. Init Clappr - POSTER NYA SELALU SAMA
  new Clappr.Player({
    source: currentStream,
    parentId: '#root',
    poster: POSTER_SATU_UNTUK_SEMUA, // MAU?hls= APAPUN POSTER TETEP INI
    width: '100%',
    height: '100%',
    autoPlay: false, // WAJIB FALSE
    plugins: [HlsjsPlayback],
    mediacontrol: {seekbar: '#1e40af'}
  });

}, 1000);
</script>
</body>


<body>

  <div id="root"></div>

</body>

</html>
