<script>
// Kalo ada ?flv= langsung bikin player sendiri, skip player.js
(function(){
  const flv=new URLSearchParams(location.search).get("flv");
  if(!flv)return; // Kalo bukan flv, biarin player.js yg jalan
  document.addEventListener("DOMContentLoaded",()=>{
    const r=document.getElementById("root")||document.body;
    r.innerHTML="";
    r.style.cssText="width:100%;max-width:1000px;margin:0 auto;aspect-ratio:16/9;background:#000";
    new window.Clappr.Player({
      source:flv,
      parent:r,
      width:"100%",
      height:"100%",
      plugins:[window.FlvjsPlayback],
      mimeType:"video/x-flv",
      poster:"/playse.jpg"
    });
    // Stop player.js biar gak nimpa
    window.stop();
  });
})();
</script>

<script src="player.js"></script>
